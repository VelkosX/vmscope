name: sample-ios

# Regenerate sample-ios.xcodeproj from this file with:
#     (cd sample-kmp/ios-app && xcodegen)
#
# The generated xcodeproj is committed so `open sample-kmp/ios-app/sample-ios.xcodeproj` works
# without the xcodegen step. Regenerate only if you edit this YAML (e.g. to add a file, change
# the deployment target, or tweak build settings).

options:
  bundleIdPrefix: org.velkos.vmscope.sample
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Silence the "No icon set for AppIcon" warning — the sample doesn't ship app art.
    ASSETCATALOG_COMPILER_APPICON_NAME: ""

targets:
  sample-ios:
    type: application
    platform: iOS
    sources:
      - path: sample-ios
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.velkos.vmscope.sample.ios
        # Auto-generate Info.plist so there's no separate plist to maintain alongside the YAML.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: "vmScope Sample"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # iPhone + iPad; simulator-only in practice (see README).
        TARGETED_DEVICE_FAMILY: "1,2"
        # The sample xcframework is simulator-only — don't try to build/run on device.
        SUPPORTED_PLATFORMS: "iphonesimulator"
    dependencies:
      # Embed without signing — simulator-only sample, no code-signing identity required.
      - framework: ../shared/build/XCFrameworks/debug/SampleShared.xcframework
        embed: true
        codeSign: false
